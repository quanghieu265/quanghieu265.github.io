<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css">
    <link rel="stylesheet" href="form.css">
    <title>Adding Form</title>
</head>

<body>
    <div class="container">
        <h1>Thêm Mới Học Viên</h1>
        <form>
            <label for="name">Họ tên <span>*</span></label>
            <input type="text" id="name" placeholder="Hãy nhập tên của bạn" required>

            <label for="birth">Ngày sinh</label>
            <input type="date" id="birth" placeholder="Hãy nhập ngày sinh của ban">

            <label for="email">Email <span>*</span></label>
            <input type="email" id="email" placeholder="Hãy nhập email của bạn" required>

            <label for="phone">Phone <span>*</span></label>
            <input type="number" id="phone" placeholder="Hãy nhập số đt của bạn" required>

        </form>
        <div class="button-form">
            <a href="./index.html" class="go-back">
                <i class="fas fa-chevron-left"></i> Quay lại
            </a>
            <button type="submit" class="save">
                <i class="far fa-save"></i> Lưu
            </button>
        </div>
    </div>
</body>

</html>
